<input type="number" id="roll" placeholder="Enter Roll Number">
<script>
let captcha = "";

// Captcha generate
function generateCaptcha() {
  let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  captcha = "";
  for (let i = 0; i < 6; i++) {
    captcha += chars[Math.floor(Math.random() * chars.length)];
  }
  document.getElementById("captchaBox").innerText = captcha;
}

// Seeded random (fixed per roll)
function seededRandom(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

// Generate result from roll
function getResult(roll) {
  let rand = seededRandom(roll);

  let percentage = Math.floor(rand * 41) + 60; // 60–100
  let status = percentage >= 33 ? "PASS 🎉" : "FAIL ❌";

  return { percentage, status };
}

// Check result
function checkResult() {
  let roll = Number(document.getElementById("roll").value);
  let userCaptcha = document.getElementById("captchaInput").value;

  let min = 11267210430201;
  let max = 11267210430284;

  if (!roll || roll < min || roll > max) {
    document.getElementById("result").innerHTML = "❌ Invalid Roll Number!";
    generateCaptcha();
    return;
  }

  if (userCaptcha !== captcha) {
    document.getElementById("result").innerHTML = "❌ Wrong Captcha!";
    generateCaptcha();
    return;
  }

  let resultData = getResult(roll);

  document.getElementById("result").innerHTML =
    "Roll No: " + roll +
    "<br>Class: 11th" +
    "<br>Status: " + resultData.status +
    "<br>Percentage: " + resultData.percentage + "%";

  generateCaptcha();
}

// First load
generateCaptcha();
</script>
