  <br><br>

  <button onclick="showResult()">Check</button>

  <div id="result"></div>

<script>

// Real random but fixed 😎
function getResult(roll) {
  let seed = 0;

  // roll number ke har digit mix karo
  let str = roll.toString();
  for (let i = 0; i < str.length; i++) {
    seed += str.charCodeAt(i) * (i + 1);
  }

  // complex random formula
  let random = Math.abs(Math.sin(seed) * 10000);

  let percent = Math.floor(random % 41) + 60; // 60–100

  return percent;
}

function showResult() {
  let roll = document.getElementById("roll").value;

  if (!roll) {
    document.getElementById("result").innerHTML = "Roll number daalo!";
    return;
  }

  let percent = getResult(roll);

  document.getElementById("result").innerHTML =
    "Roll No: " + roll +
    "<br>Result: PASS 🎉" +
    "<br>Percentage: " + percent + "%";
}

</script>
